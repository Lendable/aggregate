name: agents-upgrade

on:
  workflow_dispatch:
  schedule:
    # Repo-specific stable slot generated by agents migrate; change it if this repo already uses that window.
    - cron: "17 2 * * 3"

jobs:
  agents-upgrade:
    runs-on: lendable-small-arm64-linux # use -dev suffix in Lendable-Sandbox
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: ai-assets
        with:
          app-id: ${{ vars.AI_ASSETS_APP_ID }}
          private-key: ${{ secrets.AI_ASSETS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.ai-assets.outputs.token }}

      - uses: Lendable/ai/packages/ai-agents-upgrade-action@main
        with:
          artifactory-npm-token: ${{ secrets.ARTIFACTORY_NPM_ACCESS_TOKEN }}
          github-token: ${{ steps.ai-assets.outputs.token }}
